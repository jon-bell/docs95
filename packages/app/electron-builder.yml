appId: com.example.word
productName: Word
copyright: Copyright © 2026

# We stage a minimal app tree at release-staging/ (see scripts/stage-dist.mjs)
# containing only dist/, build/, and a sanitized package.json with zero deps.
# electron-builder reads from there, so it never traverses pnpm's workspace-
# linked node_modules — which either bloated the asar with source (Linux) or
# failed outright on macOS and Windows.
directories:
  app: release-staging
  output: release
  buildResources: build

publish: null

files:
  - dist/**/*
  - package.json
  - '!**/*.map'

# Keep artifact filenames clean of the @word/app scope slug.
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

asar: true

# Skip @electron/rebuild — we have zero native dependencies and the rebuild
# step otherwise trips on pnpm's symlinked node_modules on macOS / Windows.
npmRebuild: false
buildDependenciesFromSource: false
nodeGypRebuild: false

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  # identity: null disables code-signing entirely. Without credentials, signing
  # attempts fail with a cryptic "packages/app not a file" error from the walk
  # @electron/osx-sign does. Users with an Apple Developer cert should override
  # via the CSC_LINK / CSC_KEY_PASSWORD env vars (see docs/packaging.md) — when
  # those are set, electron-builder ignores identity: null.
  identity: null
  # hardenedRuntime, gatekeeperAssess, and entitlements only apply when signing.
  # Left here (commented) as breadcrumbs for when signing gets wired.
  # hardenedRuntime: true
  # gatekeeperAssess: false
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist

dmg:
  writeUpdateInfo: false

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  # Code signing requires a cert supplied via CSC_LINK / CSC_KEY_PASSWORD.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: Word

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  icon: build/icon.png
  category: Office
  maintainer: word@example.com
  vendor: Word Contributors
  synopsis: Word 95 reference implementation
  description: |
    A desktop word processor with feature parity to Microsoft Word 95.
    DOCX in, DOCX out. A reference implementation of clean software
    architecture assembled by a fleet of LLM agents.
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

# appImage:
#   license: LICENSE   # enable once the repo has a LICENSE file
