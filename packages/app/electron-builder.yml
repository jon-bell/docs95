appId: com.example.word
productName: Word
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

# Explicitly opt out of auto-publish. Even with --publish never on the CLI,
# electron-builder tries to compute update channels when GH_TOKEN is in the
# env (as it is on every GitHub Actions runner) and errors on a missing
# publish configuration. null disables the whole publisher subsystem.
publish: null

# We pack self-contained CJS bundles plus the Vite-built renderer. No native
# deps, no node_modules traversal needed.
files:
  - dist/**/*
  - package.json
  - '!**/*.map'

# The @word/app scope is used in-workspace. Inside the installer we surface
# the binary as `word` so scripts, .desktop entries, and dpkg are happy.
extraMetadata:
  name: word

# Keep artifact filenames clean of the @word/app scope slug.
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

asar: true

# Skip @electron/rebuild — we have zero native dependencies and the rebuild
# step otherwise trips on pnpm's symlinked node_modules on macOS / Windows.
npmRebuild: false
buildDependenciesFromSource: false
nodeGypRebuild: false

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  # Code signing + notarisation require Apple Developer credentials supplied via
  # the CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD env
  # vars in CI. Unsigned builds run locally with a Gatekeeper override warning.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  writeUpdateInfo: false

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  # Code signing requires a cert supplied via CSC_LINK / CSC_KEY_PASSWORD.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: Word

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  icon: build/icon.png
  category: Office
  maintainer: word@example.com
  vendor: Word Contributors
  synopsis: Word 95 reference implementation
  description: |
    A desktop word processor with feature parity to Microsoft Word 95.
    DOCX in, DOCX out. A reference implementation of clean software
    architecture assembled by a fleet of LLM agents.
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

# appImage:
#   license: LICENSE   # enable once the repo has a LICENSE file
